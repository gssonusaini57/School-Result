<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khalsa International School | Result Portal</title>
    <style>
        :root { --primary: #1a237e; --accent: #ffd700; }
        body { font-family: 'Times New Roman', serif; background: #f0f2f5; margin: 0; padding: 20px; }
        
        /* Form Section */
        .no-print { max-width: 850px; background: white; padding: 25px; margin: 0 auto 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 5px solid var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 15px; }
        input, select { padding: 12px; border: 1px solid #ccc; border-radius: 6px; width: 100%; box-sizing: border-box; }
        button { cursor: pointer; border: none; border-radius: 6px; font-weight: bold; padding: 12px; transition: 0.3s; }
        .btn-save { background: var(--primary); color: white; width: 100%; font-size: 18px; }
        
        /* Letterhead Report Card Layout */
        #reportCard { 
            display: none; 
            width: 210mm; 
            min-height: 297mm; 
            padding: 10mm; 
            margin: auto; 
            background: white; 
            box-sizing: border-box; 
            position: relative;
            border: 1px solid #eee;
        }

        /* Background Letterhead Image */
        .letterhead-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.15; /* Isnu tusi adjust kar sakde ho */
            pointer-events: none;
        }

        .content-layer {
            position: relative;
            z-index: 2;
        }

        /* School Logo & Header */
        .school-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            text-align: center;
        }
        .school-logo {
            width: 100px;
            height: 100px;
            object-fit: contain;
        }

        .report-title { 
            text-align: center; 
            background: var(--primary); 
            color: white; 
            padding: 10px; 
            margin: 20px 0; 
            font-size: 20px; 
            font-weight: bold;
            -webkit-print-color-adjust: exact; 
        }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #333; padding: 12px; text-align: center; }
        th { background: #f2f2f2; -webkit-print-color-adjust: exact; }

        .footer-summary { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
            border: 2px solid #333; 
            padding: 15px; 
            margin-top: 30px; 
            background: #f9f9f9; 
            font-weight: bold;
            -webkit-print-color-adjust: exact;
        }

        .signatures { margin-top: 100px; display: flex; justify-content: space-between; font-weight: bold; }
        .sign-line { border-top: 2px solid #000; width: 180px; text-align: center; padding-top: 5px; }

        @media print {
            body { padding: 0; background: white; }
            .no-print { display: none !important; }
            #reportCard { display: block !important; border: none; margin: 0; width: 100%; }
            .letterhead-bg { opacity: 0.2; } /* Print de time letterhead thora dark dikhega */
        }
    </style>
</head>
<body>

<div class="container no-print">
    <h2 style="text-align: center;">Khalsa International School Admin</h2>
    
    <div style="background: #fff3e0; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ffe0b2;">
        <label><strong>Purana Record Search (Roll No):</strong></label>
        <div style="display: flex; gap: 10px; margin-top: 5px;">
            <input type="text" id="searchRoll" placeholder="e.g. 101">
            <button onclick="searchData()" style="background: #f57c00; color: white; width: 150px;">Search</button>
        </div>
    </div>

    <div class="grid">
        <input type="text" id="name" placeholder="Student Full Name">
        <input type="text" id="roll" placeholder="Roll Number">
        <select id="className">
            <option value="9th">Class 9th</option>
            <option value="10th">Class 10th</option>
            <option value="11th">Class 11th</option>
            <option value="12th">Class 12th</option>
        </select>
        <input type="text" id="session" value="2025-26">
    </div>

    <div class="grid" style="grid-template-columns: repeat(3, 1fr);">
        <input type="number" id="m" placeholder="Maths">
        <input type="number" id="s" placeholder="Science">
        <input type="number" id="p" placeholder="Punjabi">
        <input type="number" id="e" placeholder="English">
        <input type="number" id="h" placeholder="Hindi">
        <input type="number" id="ss" placeholder="S. St.">
    </div>
    
    <button class="btn-save" onclick="generateReport()">Generate & Sync Cloud</button>
</div>

<div id="reportCard">
    <img src="letterhead.jpg" class="letterhead-bg" alt="Letterhead Background">

    <div class="content-layer">
        <div class="school-header">
            <img src="logo.png" class="school-logo" alt="School Logo">
            <div>
                <h1 style="margin:0; color:var(--primary); font-size: 36px;">KHALSA INTERNATIONAL SCHOOL</h1>
                <p style="margin:5px 0; font-weight:bold; letter-spacing: 1px;">Academic Progress Report Card</p>
            </div>
        </div>

        <div class="report-title">ANNUAL EXAMINATION RESULT</div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; font-size: 18px; font-weight: bold; border: 1px solid #ddd; padding: 15px;">
            <div>Student Name: <span id="rName" style="color:var(--primary)"></span></div>
            <div>Roll Number: <span id="rRoll"></span></div>
            <div>Class: <span id="rClass"></span></div>
            <div>Session: <span id="rSession"></span></div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>SUBJECT</th>
                    <th>MAX MARKS</th>
                    <th>OBTAINED</th>
                    <th>GRADE</th>
                </tr>
            </thead>
            <tbody id="rBody"></tbody>
        </table>

        <div class="footer-summary">
            <div>Grand Total: <span id="rTotal"></span> / 600</div>
            <div>Percentage: <span id="rPer"></span>%</div>
            <div>Result Status: <span id="rStatus"></span></div>
        </div>

        <div class="signatures">
            <div class="sign-line">Class Teacher</div>
            <div class="sign-line">Principal Signature</div>
        </div>

        <button class="no-print" onclick="window.print()" style="margin-top: 50px; background: #2e7d32; color: white; width: 100%; font-size: 18px;">Confirm & Print Report Card</button>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz9PX1qPXn5A0tu2IXraxesgbSCGSqy3gSW8mbVqDH3gTw6FpiW5HBrWsJWS9qBoTfX/exec';

    function getGrade(m) {
        if(m >= 90) return 'A+'; if(m >= 80) return 'A';
        if(m >= 70) return 'B'; if(m >= 60) return 'C';
        if(m >= 33) return 'D'; return 'E (Fail)';
    }

    async function generateReport() {
        const data = {
            name: document.getElementById('name').value,
            roll: document.getElementById('roll').value,
            cls: document.getElementById('className').value,
            session: document.getElementById('session').value,
            maths: parseInt(document.getElementById('m').value)||0,
            science: parseInt(document.getElementById('s').value)||0,
            punjabi: parseInt(document.getElementById('p').value)||0,
            english: parseInt(document.getElementById('e').value)||0,
            hindi: parseInt(document.getElementById('h').value)||0,
            sst: parseInt(document.getElementById('ss').value)||0
        };

        data.total = data.maths + data.science + data.punjabi + data.english + data.hindi + data.sst;
        data.per = (data.total / 6).toFixed(2);
        data.status = (data.maths>=33 && data.science>=33 && data.punjabi>=33 && data.english>=33 && data.hindi>=33 && data.sst>=33) ? "PASSED" : "RE-APPEAR";

        document.getElementById('rName').innerText = data.name.toUpperCase();
        document.getElementById('rRoll').innerText = data.roll;
        document.getElementById('rClass').innerText = data.cls;
        document.getElementById('rSession').innerText = data.session;
        document.getElementById('rTotal').innerText = data.total;
        document.getElementById('rPer').innerText = data.per;
        document.getElementById('rStatus').innerText = data.status;

        let rows = "";
        const subs = [["Mathematics", data.maths], ["Science", data.science], ["Punjabi", data.punjabi], ["English", data.english], ["Hindi", data.hindi], ["Social Science", data.sst]];
        subs.forEach(s => {
            rows += `<tr><td>${s[0]}</td><td>100</td><td>${s[1]}</td><td>${getGrade(s[1])}</td></tr>`;
        });
        document.getElementById('rBody').innerHTML = rows;
        document.getElementById('reportCard').style.display = 'block';

        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
            alert("Record Synced with Google Sheets!");
        } catch (e) { console.log("Sheet Update Failed", e); }
    }

    async function searchData() {
        const roll = document.getElementById('searchRoll').value;
        try {
            const res = await fetch(`${SCRIPT_URL}?roll=${roll}`);
            const data = await res.json();
            if(data.name) {
                document.getElementById('name').value = data.name;
                document.getElementById('roll').value = data.roll;
                document.getElementById('className').value = data.cls;
                document.getElementById('m').value = data.maths;
                document.getElementById('s').value = data.science;
                document.getElementById('p').value = data.punjabi;
                document.getElementById('e').value = data.english;
                document.getElementById('h').value = data.hindi;
                document.getElementById('ss').value = data.sst;
                generateReport();
            } else { alert("Not Found"); }
        } catch(e) { console.log(e); }
    }
</script>
</body>
</html>
