<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Khalsa International School | Step-wise ERP</title>
    <style>
        :root { --primary: #1a237e; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .step-box { border-left: 4px solid var(--primary); padding: 15px; margin-bottom: 20px; background: #f9f9f9; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        input, select { padding: 12px; border: 1px solid #ccc; border-radius: 6px; width: 100%; box-sizing: border-box; }
        
        .marks-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .marks-input { background: #fffde7; border: 1px solid #ffd54f; }

        button { padding: 12px 25px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.3s; }
        .btn-next { background: var(--primary); color: white; width: 100%; margin-top: 20px; }
        
        .record-card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-top: 10px; background: #fff; display: flex; justify-content: space-between; align-items: center; }
        .badge { padding: 5px 10px; border-radius: 4px; font-size: 12px; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: var(--primary);">Student Progress Tracker</h2>

    <div class="step-box">
        <p><strong>Step 1: Student & Exam Selection</strong></p>
        <div class="grid">
            <input type="text" id="rollNo" placeholder="Roll Number (e.g. 101)">
            <select id="examType" onchange="toggleMarksFields()">
                <option value="">-- Select Exam --</option>
                <option value="PT1">PT 1 (Max: 35)</option>
                <option value="PT2">PT 2 (Max: 35)</option>
                <option value="SA1">SA 1 (Max: 80)</option>
                <option value="PT3">PT 3 (Max: 35)</option>
                <option value="PB">PT4 / Pre-Board (Max: 80)</option>
                <option value="SA2">SA 2 (Max: 80)</option>
            </select>
            <select id="className" onchange="toggleMarksFields()">
                <option value="">-- Select Class --</option>
                <option value="9th">9th Class</option>
                <option value="10th">10th Class</option>
            </select>
        </div>
    </div>

    <div id="marksEntrySection" class="step-box" style="display:none;">
        <p><strong>Step 2: Enter Marks for <span id="selectedExamLabel" style="color:red;"></span></strong></p>
        <div id="subjectInputs" class="marks-grid">
            </div>
        <button class="btn-next" onclick="uploadMarks()">Save This Exam Record</button>
    </div>

    <hr>

    <h3>Full Year Records (Database)</h3>
    <div id="liveRecords">
        <p style="color: #888;">No records loaded. Use Search to see total progress.</p>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz9PX1qPXn5A0tu2IXraxesgbSCGSqy3gSW8mbVqDH3gTw6FpiW5HBrWsJWS9qBoTfX/exec';
    
    // Class wise subjects as per your requirement
    const subjects = {
        "9th": ["English", "Punjabi", "Hindi", "Maths", "Science", "S.S.T"],
        "10th": ["English", "Punjabi", "Hindi", "Maths", "Science", "S.S.T"]
    };

    function toggleMarksFields() {
        const exam = document.getElementById('examType').value;
        const cls = document.getElementById('className').value;
        const section = document.getElementById('marksEntrySection');
        const inputArea = document.getElementById('subjectInputs');

        if(exam && cls) {
            section.style.display = "block";
            document.getElementById('selectedExamLabel').innerText = exam;
            
            inputArea.innerHTML = subjects[cls].map(sub => `
                <div>
                    <label style="font-size:12px; font-weight:bold;">${sub}</label>
                    <input type="number" class="m-input" data-sub="${sub}" placeholder="Marks">
                </div>
            `).join('');
        } else {
            section.style.display = "none";
        }
    }

    async function uploadMarks() {
        const roll = document.getElementById('rollNo').value;
        const exam = document.getElementById('examType').value;
        const cls = document.getElementById('className').value;
        const inputs = document.querySelectorAll('.m-input');

        if(!roll) return alert("Enter Roll Number first!");

        let marksData = {};
        inputs.forEach(i => {
            marksData[i.dataset.sub] = i.value || 0;
        });

        const payload = {
            action: "updateMarks",
            roll: roll,
            exam: exam,
            class: cls,
            marks: marksData
        };

        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            alert(exam + " Marks Updated Successfully!");
            loadGrandTotal(roll); // Refresh View
        } catch(e) { alert("Error uploading marks"); }
    }

    async function loadGrandTotal(roll) {
        // Fetch full year data for this student and show grand total
        const res = await fetch(`${SCRIPT_URL}?type=fullRecord&roll=${roll}`);
        const data = await res.json();
        
        const recordDiv = document.getElementById('liveRecords');
        if(data.name) {
            recordDiv.innerHTML = `
                <div class="record-card">
                    <div>
                        <strong>${data.name} (Roll: ${data.roll})</strong><br>
                        <small>Class: ${data.class}</small>
                    </div>
                    <div style="text-align:right;">
                        <span class="badge" style="background:green;">Grand Total: ${data.grandTotal}</span><br>
                        <span class="badge" style="background:blue;">Percentage: ${data.percentage}%</span>
                    </div>
                </div>
            `;
        }
    }
</script>

</body>
</html>
