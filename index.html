<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khalsa International School | Admin Portal</title>
    <style>
        :root { --primary: #1a237e; --accent: #ffd700; --light: #f4f7f6; }
        body { font-family: 'Times New Roman', serif; background: var(--light); margin: 0; padding: 20px; }
        
        .no-print { max-width: 1000px; background: white; padding: 25px; margin: 0 auto 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 5px solid var(--primary); }
        
        /* Tabs Styling */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; background: #eee; font-weight: bold; border-radius: 5px; }
        .tab-btn.active { background: var(--primary); color: white; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        input, select { padding: 12px; border: 1px solid #ccc; border-radius: 6px; width: 100%; box-sizing: border-box; }
        
        button { cursor: pointer; border: none; border-radius: 6px; font-weight: bold; padding: 12px; transition: 0.3s; }
        .btn-save { background: var(--primary); color: white; width: 100%; font-size: 18px; }
        
        /* Report Card Styling */
        #reportCard { display: none; width: 210mm; min-height: 297mm; padding: 15mm; margin: auto; background: white; position: relative; border: 1px solid #ddd; }
        .letterhead-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.12; pointer-events: none; }
        .content-layer { position: relative; z-index: 2; }
        .school-header { display: flex; align-items: center; justify-content: center; gap: 20px; text-align: center; border-bottom: 3px solid var(--primary); padding-bottom: 10px; }
        .school-logo { width: 80px; height: 80px; object-fit: contain; }

        /* Class Report Table */
        .report-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .report-table th, .report-table td { border: 1px solid #333; padding: 10px; text-align: center; }
        .report-table th { background: var(--primary); color: white; }

        @media print {
            .no-print { display: none !important; }
            #reportCard, #classReportView { display: block !important; border: none; width: 100%; margin: 0; }
            body { background: white; padding: 0; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <div class="school-header" style="border:none;">
        <img src="logo.png" class="school-logo" alt="Logo">
        <h2 style="color: var(--primary); margin:0;">Khalsa International School Management</h2>
    </div>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('entry')">Result Entry</button>
        <button class="tab-btn" onclick="showTab('report')">Class-wise Report</button>
    </div>

    <div id="entryTab">
        <div class="grid">
            <input type="text" id="name" placeholder="Student Name">
            <input type="text" id="roll" placeholder="Roll No">
            <input type="text" id="className" placeholder="Class (e.g. 10th)">
            <input type="text" id="session" value="2025-26">
        </div>
        <p><strong>Add Subjects & Marks:</strong></p>
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <input type="text" id="newSub" placeholder="Subject Name">
            <button onclick="addSubject()" style="background: var(--accent); color: #000;">+ Add</button>
        </div>
        <div id="marksArea" class="grid" style="grid-template-columns: repeat(3, 1fr);"></div>
        <button class="btn-save" onclick="generateReport()">Generate & Save Result</button>
    </div>

    <div id="reportTab" style="display:none;">
        <div style="display: flex; gap: 10px; background: #e3f2fd; padding: 15px; border-radius: 8px;">
            <input type="text" id="searchClass" placeholder="Enter Class Name (e.g. 10th)">
            <button onclick="fetchClassReport()" style="background: #2e7d32; color: white; width: 150px;">Get Report</button>
        </div>
        <div id="classReportView">
            <h3 id="classTitle" style="text-align:center; margin-top:20px;"></h3>
            <table class="report-table" id="classTable">
                <thead>
                    <tr>
                        <th>Roll No</th>
                        <th>Name</th>
                        <th>Total</th>
                        <th>%age</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="classBody"></tbody>
            </table>
            <button class="no-print" onclick="window.print()" style="background: #555; color: white; margin-top: 15px;">Print Full List</button>
        </div>
    </div>
</div>

<div id="reportCard">
    <img src="letterhead.jpg" class="letterhead-bg" alt="">
    <div class="content-layer">
        <div class="school-header">
            <img src="logo.png" class="school-logo" alt="Logo">
            <div>
                <h1 style="margin:0; color:var(--primary); font-size: 32px;">KHALSA INTERNATIONAL SCHOOL</h1>
                <p>Knowledge • Integrity • Service</p>
            </div>
        </div>
        <h3 style="text-align:center; border: 1px solid #000; padding: 5px; margin: 20px 0;">ANNUAL PROGRESS REPORT CARD</h3>
        <div class="grid" style="border-bottom: 1px solid #ccc; padding-bottom: 10px;">
            <div>Name: <span id="rName"></span></div>
            <div>Roll: <span id="rRoll"></span></div>
            <div>Class: <span id="rClass"></span></div>
        </div>
        <table class="report-table">
            <thead><tr><th>Subject</th><th>Max Marks</th><th>Obtained</th><th>Grade</th></tr></thead>
            <tbody id="rBody"></tbody>
        </table>
        <div style="display: flex; justify-content: space-between; font-weight: bold; margin-top: 20px; background: #eee; padding: 10px;">
            <span>Total: <span id="rTotal"></span></span>
            <span>%age: <span id="rPer"></span>%</span>
            <span>Result: <span id="rStatus"></span></span>
        </div>
        <div style="margin-top: 60px; display: flex; justify-content: space-between;">
            <span style="border-top: 1px solid #000; width: 150px; text-align: center;">Class Teacher</span>
            <span style="border-top: 1px solid #000; width: 150px; text-align: center;">Principal</span>
        </div>
        <button class="no-print" onclick="window.print()" style="background: #007bff; color: white; width: 100%; margin-top: 30px;">Download/Print PDF</button>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz9PX1qPXn5A0tu2IXraxesgbSCGSqy3gSW8mbVqDH3gTw6FpiW5HBrWsJWS9qBoTfX/exec';
    let subjects = [];

    function showTab(tab) {
        document.getElementById('entryTab').style.display = tab === 'entry' ? 'block' : 'none';
        document.getElementById('reportTab').style.display = tab === 'report' ? 'block' : 'none';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    function addSubject() {
        let name = document.getElementById('newSub').value;
        if(name && !subjects.includes(name)) {
            subjects.push(name);
            let div = document.createElement('div');
            div.innerHTML = `<label>${name}</label><input type="number" class="sub-marks" data-name="${name}">`;
            document.getElementById('marksArea').appendChild(div);
            document.getElementById('newSub').value = '';
        }
    }

    async function generateReport() {
        let marks = document.querySelectorAll('.sub-marks');
        let data = { 
            name: document.getElementById('name').value, 
            roll: document.getElementById('roll').value,
            cls: document.getElementById('className').value,
            session: document.getElementById('session').value,
            total: 0, 
            marksList: [] 
        };

        let rows = "";
        marks.forEach(m => {
            let val = parseInt(m.value) || 0;
            data.total += val;
            let sub = m.getAttribute('data-name');
            rows += `<tr><td>${sub}</td><td>100</td><td>${val}</td><td>${val >= 33 ? 'P' : 'F'}</td></tr>`;
            data.marksList.push(`${sub}:${val}`);
        });

        data.per = (data.total / (marks.length || 1)).toFixed(2);
        data.status = data.per >= 33 ? "PASSED" : "FAILED";

        // Fill Report Card
        document.getElementById('rName').innerText = data.name;
        document.getElementById('rRoll').innerText = data.roll;
        document.getElementById('rClass').innerText = data.cls;
        document.getElementById('rBody').innerHTML = rows;
        document.getElementById('rTotal').innerText = data.total;
        document.getElementById('rPer').innerText = data.per;
        document.getElementById('rStatus').innerText = data.status;
        document.getElementById('reportCard').style.display = 'block';

        // Save to Google Sheets
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
        alert("Record Saved!");
    }

    async function fetchClassReport() {
        let cls = document.getElementById('searchClass').value;
        let res = await fetch(`${SCRIPT_URL}?type=class&cls=${cls}`);
        let records = await res.json();
        
        let rows = "";
        records.forEach(r => {
            rows += `<tr><td>${r.roll}</td><td>${r.name}</td><td>${r.total}</td><td>${r.per}%</td><td>${r.status}</td></tr>`;
        });
        document.getElementById('classBody').innerHTML = rows;
        document.getElementById('classTitle').innerText = "Result Summary: Class " + cls;
    }
</script>
</body>
</html>
