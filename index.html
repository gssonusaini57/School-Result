<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khalsa International School | Result Management</title>
    <style>
        :root { --primary: #1a237e; --accent: #ffd700; --bg: #f8f9fa; }
        body { font-family: 'Times New Roman', serif; background: var(--bg); margin: 0; padding: 15px; }
        .no-print { max-width: 900px; background: white; padding: 25px; margin: auto; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); border-top: 6px solid var(--primary); }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; background: #eee; padding: 5px; border-radius: 8px; }
        .tab-btn { flex: 1; padding: 12px; border: none; cursor: pointer; font-weight: bold; border-radius: 5px; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        input, select { padding: 12px; border: 1px solid #ccc; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 15px; }
        
        .marks-section { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: #fffde7; padding: 15px; border-radius: 8px; border: 1px solid #ffe082; }
        .marks-input-box { display: flex; flex-direction: column; }
        .marks-input-box label { font-size: 13px; font-weight: bold; margin-bottom: 3px; color: var(--primary); }

        button { cursor: pointer; border: none; border-radius: 6px; font-weight: bold; padding: 12px; }
        .btn-main { background: var(--primary); color: white; width: 100%; font-size: 18px; margin-top: 15px; }

        /* Report Card */
        #reportCard { display: none; width: 210mm; min-height: 297mm; padding: 15mm; margin: auto; background: white; position: relative; border: 1px solid #ddd; }
        .letterhead-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.1; pointer-events: none; }
        .content-layer { position: relative; z-index: 2; }
        .school-header { display: flex; align-items: center; justify-content: center; gap: 20px; text-align: center; border-bottom: 3px solid var(--primary); padding-bottom: 10px; }
        .school-logo { width: 85px; height: 85px; object-fit: contain; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: center; }
        th { background: #f2f2f2; -webkit-print-color-adjust: exact; }

        .footer-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; border: 2px solid #333; padding: 15px; margin-top: 20px; background: #f9f9f9; font-weight: bold; -webkit-print-color-adjust: exact; }

        @media print {
            .no-print { display: none !important; }
            #reportCard { display: block !important; border: none; width: 100%; margin: 0; padding: 5mm; }
            body { background: white; padding: 0; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('admin')">Admin (Marks Entry)</button>
        <button class="tab-btn" onclick="showTab('student')">Student Portal (Search)</button>
    </div>

    <div id="adminTab">
        <h3 style="color: var(--primary);">Result Data Entry</h3>
        <div class="grid">
            <input type="text" id="name" placeholder="Student Name">
            <input type="text" id="roll" placeholder="Roll Number">
            <select id="className" onchange="loadSubjects()">
                <option value="">Select Class</option>
                <option value="Nursery">Nursery</option>
                <option value="LKG">L.K.G</option>
                <option value="UKG">U.K.G</option>
                <option value="1st">1st Class</option>
                <option value="2nd">2nd Class</option>
                <option value="3rd">3rd Class</option>
                <option value="4th">4th Class</option>
                <option value="5th">5th Class</option>
                <option value="6th">6th Class</option>
                <option value="7th">7th Class</option>
                <option value="8th">8th Class</option>
                <option value="9th">9th Class</option>
                <option value="10th">10th Class</option>
                <option value="11th">11th Class</option>
                <option value="12th">12th Class</option>
            </select>
            <input type="text" id="session" value="2025-26">
        </div>

        <div id="marksArea" class="marks-section">
            <p style="grid-column: 1/-1; color: #777;">Please select a class to load subjects...</p>
        </div>
        
        <button class="btn-main" onclick="saveAndGenerate()">Generate & Save Report Card</button>
    </div>

    <div id="studentTab" style="display:none;">
        <h3 style="color: var(--primary);">Check Student Result</h3>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="searchRoll" placeholder="Enter Roll Number">
            <button onclick="searchResult()" style="background: #ef6c00; color: white; width: 120px;">Search</button>
        </div>
    </div>
</div>

<div id="reportCard">
    <img src="letterhead.jpg" class="letterhead-bg">
    <div class="content-layer">
        <div class="school-header">
            <img src="logo.png" class="school-logo">
            <div>
                <h1 style="margin:0; color:var(--primary);">KHALSA INTERNATIONAL SCHOOL</h1>
                <p style="font-weight:bold; letter-spacing: 1px;">PROGRESS REPORT CARD (2025-26)</p>
            </div>
        </div>

        <div class="grid" style="margin-top: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px;">
            <div><strong>Student Name:</strong> <span id="rName"></span></div>
            <div><strong>Roll No:</strong> <span id="rRoll"></span></div>
            <div><strong>Class:</strong> <span id="rClass"></span></div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Subject</th>
                    <th>Max Marks</th>
                    <th>Obtained</th>
                    <th>Grade</th>
                </tr>
            </thead>
            <tbody id="rBody"></tbody>
        </table>

        <div class="footer-summary">
            <div>Total: <span id="rTotal"></span></div>
            <div>Percentage: <span id="rPer"></span>%</div>
            <div>Result: <span id="rStatus"></span></div>
        </div>

        <div style="margin-top: 80px; display: flex; justify-content: space-between;">
            <span style="border-top: 1px solid #000; width: 150px; text-align: center;">Class Teacher</span>
            <span style="border-top: 1px solid #000; width: 150px; text-align: center;">Principal</span>
        </div>
        <button class="no-print btn-main" onclick="window.print()" style="background: #2e7d32;">Print Official Copy</button>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz9PX1qPXn5A0tu2IXraxesgbSCGSqy3gSW8mbVqDH3gTw6FpiW5HBrWsJWS9qBoTfX/exec';

    const subjectConfig = {
        "Nursery": ["English", "Punjabi", "Hindi", "Maths", "Drawing", "G.K"],
        "LKG": ["English", "Punjabi", "Hindi", "Maths", "Drawing", "G.K"],
        "UKG": ["English", "Punjabi", "Hindi", "Maths", "Drawing", "G.K", "E.V.S"],
        "1to5": ["English", "Punjabi", "Hindi", "Maths", "Drawing", "G.K", "E.V.S"],
        "6to10": ["English", "Punjabi", "Hindi", "Maths", "Drawing", "G.K", "E.V.S", "S.S.T"],
        "11to12": ["English", "Punjabi", "History", "Sociology", "Physical Education", "E.V.S", "Computer"]
    };

    function showTab(tab) {
        document.getElementById('adminTab').style.display = tab === 'admin' ? 'block' : 'none';
        document.getElementById('studentTab').style.display = tab === 'student' ? 'block' : 'none';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(tab)));
    }

    function loadSubjects() {
        const cls = document.getElementById('className').value;
        let subs = [];
        
        if (cls === "Nursery" || cls === "LKG") subs = subjectConfig["Nursery"];
        else if (cls === "UKG") subs = subjectConfig["UKG"];
        else if (["1st", "2nd", "3rd", "4th", "5th"].includes(cls)) subs = subjectConfig["1to5"];
        else if (["6th", "7th", "8th", "9th", "10th"].includes(cls)) subs = subjectConfig["6to10"];
        else if (["11th", "12th"].includes(cls)) subs = subjectConfig["11to12"];

        const area = document.getElementById('marksArea');
        area.innerHTML = subs.map(s => `
            <div class="marks-input-box">
                <label>${s}</label>
                <input type="number" class="sub-marks" data-sub="${s}" placeholder="0-100">
            </div>
        `).join('');
    }

    async function saveAndGenerate() {
        const marksInputs = document.querySelectorAll('.sub-marks');
        const data = {
            name: document.getElementById('name').value,
            roll: document.getElementById('roll').value,
            cls: document.getElementById('className').value,
            session: document.getElementById('session').value,
            marks: []
        };

        if(!data.name || !data.cls) return alert("Please fill Name and Class");

        let total = 0;
        let rows = "";
        marksInputs.forEach(input => {
            let val = parseInt(input.value) || 0;
            total += val;
            let sub = input.getAttribute('data-sub');
            rows += `<tr><td>${sub}</td><td>100</td><td>${val}</td><td>${val >= 33 ? 'A' : 'B'}</td></tr>`;
            data.marks.push(`${sub}:${val}`);
        });

        data.per = (total / (marksInputs.length || 1)).toFixed(2);
        data.status = data.per >= 33 ? "PASSED" : "FAILED";

        // Display on Report
        document.getElementById('rName').innerText = data.name;
        document.getElementById('rRoll').innerText = data.roll;
        document.getElementById('rClass').innerText = data.cls;
        document.getElementById('rBody').innerHTML = rows;
        document.getElementById('rTotal').innerText = total;
        document.getElementById('rPer').innerText = data.per;
        document.getElementById('rStatus').innerText = data.status;
        document.getElementById('reportCard').style.display = 'block';

        // Cloud Save
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
        alert("Synced with Cloud!");
    }

    async function searchResult() {
        const roll = document.getElementById('searchRoll').value;
        const res = await fetch(`${SCRIPT_URL}?type=search&roll=${roll}`);
        const result = await res.json();
        if(result.name) {
            document.getElementById('name').value = result.name;
            document.getElementById('className').value = result.cls;
            alert("Record Found! Check Admin Panel for details.");
            showTab('admin');
        } else { alert("Not Found"); }
    }
</script>

</body>
</html>
